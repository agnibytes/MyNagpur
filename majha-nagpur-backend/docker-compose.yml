version: '3.8'

services:
  backend_api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres_database:5432/majhanagpur
      - REDIS_URL=redis://redis_cache:6379/0
      - GEMINI_API_KEY=AIzaSyBCu_smK4HXbfZcfiSY4cCeoYaoX_Q8TVg
    depends_on:
      - postgres_database
      - redis_cache

  postgres_database:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=majhanagpur
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis_cache:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
